<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KubeSentinel — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1e293b}
    .box{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .brand{text-align:center;margin-bottom:28px}
    .brand .shield{font-size:40px}
    .brand h1{font-size:22px;font-weight:700;margin-top:8px}
    .brand p{font-size:13px;color:#64748b;margin-top:4px}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:#374151}
    input{width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;outline:none}
    input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .btn{width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
    .btn:hover{background:#2563eb}
    .alert{padding:10px 12px;background:#fee2e2;color:#dc2626;border-radius:6px;font-size:13px;margin-bottom:14px}
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <div class="shield">🛡</div>
      <h1>KubeSentinel</h1>
      <p>AI-powered Kubernetes Security</p>
    </div>
    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</body>
</html>
