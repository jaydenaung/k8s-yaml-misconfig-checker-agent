<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KubeSentinel{% endblock %}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
    a{color:inherit;text-decoration:none}
    .layout{display:flex;height:100vh;overflow:hidden}
    /* Sidebar */
    .sidebar{width:220px;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
    .sidebar-brand{padding:20px 16px;font-size:17px;font-weight:700;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:8px}
    .sidebar-brand .shield{color:#60a5fa;font-size:20px}
    .sidebar-brand .sub{font-size:10px;font-weight:400;color:#64748b;display:block;margin-top:1px}
    .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:#94a3b8;font-size:13px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
    .nav-item:hover{background:#1e293b;color:#e2e8f0}
    .nav-item.active{background:#1e293b;color:#60a5fa;border-left-color:#60a5fa}
    .nav-item .icon{width:16px;text-align:center;flex-shrink:0}
    .sidebar-footer{padding:12px 16px;border-top:1px solid #1e293b;font-size:11px;color:#475569}
    .sidebar-footer .username{color:#94a3b8;font-weight:600}
    .sidebar-footer a{color:#475569;display:inline-block;margin-top:4px}
    .sidebar-footer a:hover{color:#94a3b8}
    /* Main */
    .main{flex:1;overflow-y:auto;padding:28px 32px}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .page-title{font-size:22px;font-weight:700;color:#0f172a}
    .page-subtitle{font-size:13px;color:#64748b;margin-top:2px}
    /* Cards */
    .card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:22px;margin-bottom:20px}
    .card-title{font-size:14px;font-weight:600;color:#0f172a;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px}
    .stat{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:18px 20px}
    .stat-value{font-size:28px;font-weight:700;line-height:1}
    .stat-label{font-size:11px;color:#64748b;margin-top:5px;text-transform:uppercase;letter-spacing:.05em}
    .stat.critical .stat-value{color:#dc2626}
    .stat.high .stat-value{color:#ea580c}
    /* Table */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:9px 12px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
    td{padding:11px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafbfc}
    .td-link{color:#3b82f6}
    .td-link:hover{text-decoration:underline}
    /* Badges */
    .badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
    .badge-critical{background:#fee2e2;color:#dc2626}
    .badge-high{background:#ffedd5;color:#ea580c}
    .badge-medium{background:#fef9c3;color:#a16207}
    .badge-low{background:#dbeafe;color:#1d4ed8}
    .badge-info{background:#f1f5f9;color:#475569}
    .badge-queued{background:#f1f5f9;color:#64748b}
    .badge-running{background:#dbeafe;color:#2563eb}
    .badge-done{background:#dcfce7;color:#16a34a}
    .badge-failed{background:#fee2e2;color:#dc2626}
    .badge-ai{background:#ede9fe;color:#7c3aed}
    .badge-static{background:#e0f2fe;color:#0369a1}
    .badge-admin{background:#fef3c7;color:#92400e}
    /* CIS compliance status */
    .badge-pass{background:#dcfce7;color:#16a34a}
    .badge-fail{background:#fee2e2;color:#dc2626}
    .badge-skip{background:#f1f5f9;color:#64748b}
    .badge-manual{background:#ede9fe;color:#7c3aed}
    .badge-error{background:#fef3c7;color:#92400e}
    .score-pill{display:inline-flex;align-items:center;justify-content:center;min-width:54px;padding:5px 12px;border-radius:14px;font-weight:700;font-size:14px}
    .score-good{background:#dcfce7;color:#16a34a}
    .score-ok{background:#fef9c3;color:#a16207}
    .score-bad{background:#fee2e2;color:#dc2626}
    .score-unknown{background:#f1f5f9;color:#64748b}
    .compliance-row{display:grid;grid-template-columns:1fr 110px 110px 1fr;gap:12px;padding:10px 12px;border-bottom:1px solid #f1f5f9;align-items:center;font-size:13px}
    .compliance-row:last-child{border-bottom:none}
    .compliance-control-id{font-family:ui-monospace,monospace;font-size:12px;color:#475569;font-weight:600}
    .compliance-evidence{font-size:12px;color:#475569;background:#f8fafc;padding:8px 10px;border-radius:4px;margin-top:6px;font-family:ui-monospace,monospace;word-break:break-all}
    .compliance-section-title{font-size:13px;font-weight:700;color:#1e293b;padding:10px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;margin-top:14px}
    /* Forms */
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:#374151}
    .form-control{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none;background:#fff;transition:border-color .15s}
    .form-control:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    select.form-control{background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-position:right 8px center;background-repeat:no-repeat;background-size:16px;padding-right:30px;appearance:none}
    .form-hint{font-size:11px;color:#6b7280;margin-top:3px}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
    .btn-primary{background:#3b82f6;color:#fff}
    .btn-primary:hover{background:#2563eb}
    .btn-secondary{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}
    .btn-secondary:hover{background:#e2e8f0}
    .btn-danger{background:#ef4444;color:#fff}
    .btn-danger:hover{background:#dc2626}
    .btn-sm{padding:4px 9px;font-size:12px}
    .signal-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
    .chip-cve{background:#fee2e2;color:#dc2626}
    .chip-misc{background:#ffedd5;color:#c2410c}
    .chip-rbac{background:#fef3c7;color:#92400e}
    .chip-net{background:#dbeafe;color:#1d4ed8}
    .btn-danger-sm{display:inline-flex;align-items:center;padding:4px 10px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #fecaca;background:#fee2e2;color:#dc2626;transition:all .15s}
    .btn-danger-sm:hover{background:#dc2626;color:#fff;border-color:#dc2626}
    /* Alerts */
    .alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:16px}
    .alert-error{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
    .alert-success{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0}
    .alert-info{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
    /* Findings */
    .finding{border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px;margin-bottom:10px}
    .finding.CRITICAL{border-left:4px solid #dc2626}
    .finding.HIGH{border-left:4px solid #ea580c}
    .finding.MEDIUM{border-left:4px solid #ca8a04}
    .finding.LOW{border-left:4px solid #2563eb}
    .finding.INFO{border-left:4px solid #94a3b8}
    .finding-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
    .finding-title{font-weight:600;font-size:14px;flex:1}
    .finding-meta{font-size:11px;color:#64748b;margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap}
    .finding-detail{font-size:13px;color:#374151;margin-bottom:6px}
    .finding-fix{font-size:12px;color:#059669;background:#f0fdf4;padding:7px 10px;border-radius:4px;margin-top:6px}
    .finding-scenario{font-size:12px;color:#7c3aed;background:#faf5ff;padding:7px 10px;border-radius:4px;margin-top:4px}
    /* Misc */
    .flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
    .gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.ml-auto{margin-left:auto}
    .mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
    .text-muted{color:#64748b}.text-sm{font-size:12px}.text-right{text-align:right}
    .font-mono{font-family:ui-monospace,monospace;font-size:12px}
    .spinner{display:inline-block;width:12px;height:12px;border:2px solid #bfdbfe;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:48px;color:#94a3b8}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty h3{font-size:16px;color:#64748b;margin-bottom:4px}
    .risk-bar{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:4px}
    .risk-fill{height:100%;border-radius:3px}
    .divider{border:none;border-top:1px solid #f1f5f9;margin:16px 0}
    code{font-family:ui-monospace,monospace;font-size:12px;background:#f8fafc;padding:1px 5px;border-radius:3px;color:#0f172a}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="shield">🛡</span>
      <div>KubeSentinel<span class="sub">Security Dashboard</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
        <span class="icon">⬛</span> Dashboard
      </a>
      <a href="/manifests" class="nav-item {% if '/manifests' in request.url.path %}active{% endif %}">
        <span class="icon">📄</span> Manifests
      </a>
      <a href="/clusters" class="nav-item {% if '/clusters' in request.url.path %}active{% endif %}">
        <span class="icon">⎈</span> Clusters
      </a>
      <a href="/compliance" class="nav-item {% if '/compliance' in request.url.path %}active{% endif %}">
        <span class="icon">✓</span> Compliance
      </a>
      <a href="/images" class="nav-item {% if '/images' in request.url.path %}active{% endif %}">
        <span class="icon">📦</span> Images
      </a>
      {% if user.is_admin %}
      <a href="/users" class="nav-item {% if '/users' in request.url.path %}active{% endif %}">
        <span class="icon">👥</span> Users
      </a>
      <a href="/settings" class="nav-item {% if '/settings' in request.url.path %}active{% endif %}">
        <span class="icon">⚙️</span> Settings
      </a>
      {% endif %}
    </nav>
    <div class="sidebar-footer">
      Signed in as <span class="username">{{ user.username }}</span>
      {% if user.is_admin %}<span class="badge badge-admin" style="margin-left:4px">admin</span>{% endif %}
      <br><a href="/logout">Sign out</a>
    </div>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
